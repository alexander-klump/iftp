replicaCount: 1

image:
  repository: iftp-shiny
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80

httpRoute:
  enabled: false
  parentRefs: []
  #   - name: my-gateway
  #     namespace: gateway-ns
  hostnames: []
  #   - iftp.example.com

resources:
  limits:
    cpu: "1"
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 256Mi

podSecurityContext:
  runAsUser: 1000
  runAsNonRoot: true

nodeSelector: {}
tolerations: []
affinity: {}
