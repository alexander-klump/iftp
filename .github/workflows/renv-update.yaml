on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

name: Update renv.lock

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.RENV_BOT_APP_ID }}
          private-key: ${{ secrets.RENV_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - uses: r-lib/actions/setup-r@v2

      - uses: r-lib/actions/setup-renv@v2
        env:
          GITHUB_PAT: ${{ steps.app-token.outputs.token }}

      - name: Update and snapshot
        env:
          GITHUB_PAT: ${{ steps.app-token.outputs.token }}
        run: Rscript -e 'renv::update(prompt = FALSE); renv::snapshot(prompt = FALSE)'

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: "chore: update renv.lock"
          title: "chore: update renv.lock"
          body: |
            Automated update of `renv.lock` via scheduled workflow.

            Runs `renv::update()` followed by `renv::snapshot()`.
          branch: renv-update
          delete-branch: true
          labels: dependencies
